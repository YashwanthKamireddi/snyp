<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Snyp — long links, cut clean. A fast, no-nonsense URL shortener."
    />

    <!-- Inline SVG favicon so the browser tab carries the brand mark, not a default icon. -->

      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1714'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-style='italic' fill='%23e8442a' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E"
    />

    <!-- Distinctive type: Fraunces (characterful serif) for display, Spline Sans for
         UI text, Spline Sans Mono for links and numbers. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Spline+Sans+Mono:wght@400;500;600&family=Spline+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Snyp — Long links, cut clean.</title>
  </head>
